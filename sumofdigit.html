<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Digit</title>
</head>

<body>
    <script>
        let num = Number(prompt("Enter the Number"));

        let sum = 0;

        do {
            let digit = num % 10;
            sum = sum + digit;
            num = Math.floor(num / 10);
        } while (num > 0);

        document.write("Sum of digits =", sum);
    </script>

</body>

</html>
