<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Checker</title>
</head>

<body>

    <script>
        let num = Number(prompt("Enter a number"));

        if (num > 0) {
            alert("Positive number");
        }
        else if (num < 0) {
            alert("Negative number");
        }
        else {
            alert("Number is Zero");
        }
    </script>

</body>

</html>
