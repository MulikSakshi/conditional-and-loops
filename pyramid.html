<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pyramid</title>
</head>
<body>

<pre id="output"></pre>

<script>
function generatePyramid(rows){
    let result = "";

    for(let i = 1; i <= rows; i++){
        let line = "";

        // spaces
        for(let space = 1; space <= rows - i; space++){
            line += " ";
        }

        // increasing numbers
        for(let num = 1; num <= i; num++){
            line += num;
        }

        // decreasing numbers
        for(let num = i - 1; num >= 1; num--){
            line += num;
        }

        result += line + "\n";
    }

    document.getElementById("output").textContent = result;
}

generatePyramid(5);
</script>

</body>
</html>
